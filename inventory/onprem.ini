# ─────────────────────────────────────────────────────────────────────────────
# FILE: inventory/onprem.ini
# PURPOSE: The ADDRESS BOOK — tells Ansible which computers exist and how to reach them.
# Think of this like a contact list. Before Ansible can do anything on a computer,
# it needs to know: what is the computer's IP, what username to log in with.
# ─────────────────────────────────────────────────────────────────────────────

# [masters] means: "the computers listed below are BOSS computers (control plane)"
# The master runs the Kubernetes brain — it tells worker computers what to do.
[masters]
# master-1        = nickname you give this computer (can be anything)
# ansible_host=   = the actual IP address Ansible uses to SSH into this machine
# ansible_user=   = the Linux username Ansible logs in as (must have sudo access)
master-1 ansible_host=192.168.1.10 ansible_user=ansible

# [workers] means: "the computers listed below are WORKER computers"
# Workers are the muscle — they actually run your apps (pods/containers).
# You can add as many workers as you want, one per line.
[workers]
worker-1 ansible_host=192.168.1.11 ansible_user=ansible   # First worker computer
worker-2 ansible_host=192.168.1.12 ansible_user=ansible   # Second worker computer

# [k8s_cluster:children] means: create a SUPER-GROUP that contains smaller groups.
# "k8s_cluster" = the name of the big group
# ":children"   = tells Ansible this group is made OF other groups (not direct hosts)
# This lets site.yml say "hosts: k8s_cluster" and reach ALL computers at once.
[k8s_cluster:children]
masters    # include every computer in the [masters] group
workers    # include every computer in the [workers] group

# [k8s_cluster:vars] = settings (variables) that apply to EVERY computer in k8s_cluster.
# ":vars" means "variables for this group"
[k8s_cluster:vars]
# ansible_python_interpreter = tells Ansible which Python to use on remote computers.
# Ansible runs Python scripts on remote machines to do its work.
# "/usr/bin/python3" = use Python 3 (not the old Python 2).
ansible_python_interpreter=/usr/bin/python3

# ansible_ssh_pass = the SSH password for logging in (uncomment if not using SSH keys)
# Leave commented out if you use SSH key-based login (more secure, recommended).
# ansible_ssh_pass=changeme

# ansible_become_pass = the sudo password for becoming root/admin on the remote machine.
# Uncomment this if your ansible_user needs a password to run sudo commands.
# ansible_become_pass=changeme
