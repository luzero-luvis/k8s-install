# On-premises inventory (bare metal / VMware / Proxmox / etc.)
# Replace IPs and user with your actual values.
# Password auth example shown; swap for ssh key if preferred.

[masters]
master-1 ansible_host=192.168.1.10 ansible_user=ansible

[workers]
worker-1 ansible_host=192.168.1.11 ansible_user=ansible
worker-2 ansible_host=192.168.1.12 ansible_user=ansible

[k8s_cluster:children]
masters
workers

[k8s_cluster:vars]
ansible_python_interpreter=/usr/bin/python3
# ansible_ssh_pass=changeme          # uncomment if using password auth
# ansible_become_pass=changeme       # uncomment if sudo needs a password
