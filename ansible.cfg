# ─────────────────────────────────────────────────────────────────────────────
# FILE: ansible.cfg
# PURPOSE: Ansible's OWN settings file — controls HOW Ansible behaves globally.
# This file is automatically read by Ansible every time you run a playbook.
# Think of it as the settings panel for the Ansible tool itself.
# ─────────────────────────────────────────────────────────────────────────────

[defaults]
# inventory = where to find the address book (list of computers) by default.
# When you run ansible-playbook without -i, it looks here automatically.
inventory           = inventory/

# roles_path = where to find role folders (the job workers).
# Ansible looks here when a playbook says "roles: - common" etc.
roles_path          = roles/

# host_key_checking = when SSH-ing into a computer for the first time, SSH normally
# asks "do you trust this new machine?" and waits for you to type yes.
# False = skip that question — important for automation so it never gets stuck waiting.
host_key_checking   = False

# retry_files_enabled = if a playbook fails halfway, Ansible can write a retry file
# listing which computers failed so you can re-run only those.
# False = don't create those files (keeps things clean).
retry_files_enabled = False

# stdout_callback = controls how Ansible prints output to your terminal.
# "default" = standard readable format, one task at a time.
stdout_callback     = default

# result_format = format Ansible uses to display task results.
# "yaml" = clean, readable YAML format instead of the default Python dict format.
result_format       = yaml

# callbacks_enabled = extra plugins Ansible loads to add features.
# "profile_tasks" = shows how long each task took (great for spotting slow steps).
# "timer"         = shows total run time at the end of the playbook.
callbacks_enabled   = profile_tasks, timer

# interpreter_python = how Ansible decides which Python to use on remote machines.
# "auto_silent" = auto-detect the right Python but don't print warnings about it.
interpreter_python  = auto_silent

# gathering = controls when Ansible collects "facts" (info about each computer).
# Facts = things like: what OS is it, how much RAM, what's the IP address, etc.
# "smart" = only gather facts if they haven't been gathered yet in this run (saves time).
gathering           = smart

# fact_caching = WHERE to store gathered facts so they don't need to be re-gathered.
# "memory" = store facts in RAM during this run only (gone when playbook finishes).
fact_caching        = memory

# pipelining = instead of running one SSH command at a time, bundle multiple commands
# together and send them over a single SSH connection. Significantly faster.
# True = enable this optimization.
pipelining          = True

# forks = how many computers to work on AT THE SAME TIME (in parallel).
# 10 = Ansible will configure up to 10 computers simultaneously.
# More forks = faster, but uses more CPU/memory on your control machine.
forks               = 10

[ssh_connection]
# pipelining = same as above but specifically for the SSH transport layer.
# Must be True here too for pipelining to actually work.
pipelining  = True

# ssh_args = extra options passed directly to the SSH command.
# -o ControlMaster=auto   = reuse existing SSH connections instead of opening new ones
#                           every single time. Like keeping a door open instead of
#                           knocking and waiting each time.
# -o ControlPersist=60s   = keep that open SSH connection alive for 60 seconds after
#                           the last command. If another command comes within 60s,
#                           it reuses the same connection — much faster.
# -o ServerAliveInterval=30 = every 30 seconds, send a tiny "are you still there?"
#                           ping to the server. Prevents the connection from being
#                           killed by firewalls that drop idle connections.
ssh_args    = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
