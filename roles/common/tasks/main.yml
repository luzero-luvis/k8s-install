---
# ── Architecture & OS facts ────────────────────────────────────────────────
- name: Set deb architecture fact
  set_fact:
    deb_arch: "{{ arch_map[ansible_architecture] }}"
    # chrony service name differs by OS family
    chrony_svc: "{{ 'chrony' if ansible_os_family == 'Debian' else 'chronyd' }}"
    # kubelet extra-args file path differs by OS family
    kubelet_env_file: "{{ '/etc/sysconfig/kubelet' if ansible_os_family == 'RedHat' else '/etc/default/kubelet' }}"
  tags: [always]

# ── Hostname & hosts ───────────────────────────────────────────────────────
- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"
  tags: [common, hostname]

- name: Update /etc/hosts with cluster nodes
  lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item].ansible_host }} {{ item }}"
    state: present
  loop: "{{ groups['k8s_cluster'] }}"
  tags: [common, hostname]

# ── Timezone ──────────────────────────────────────────────────────────────
- name: Set timezone to Asia/Kolkata
  community.general.timezone:
    name: Asia/Kolkata
  tags: [common, timezone]

# ── SELinux (RedHat on-prem) ───────────────────────────────────────────────
- name: Configure SELinux
  ansible.posix.selinux:
    policy: targeted
    state: "{{ selinux_state }}"
  when: ansible_os_family == "RedHat"
  tags: [common, selinux]

# ── Package update & base packages ────────────────────────────────────────
- name: Full system upgrade (Debian)
  apt:
    upgrade: full
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  tags: [common, packages]

- name: Install prerequisite packages (Debian)
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - wget
      - gnupg
      - lsb-release
      - socat
      - conntrack
      - ipset
      - ipvsadm
      - chrony
      - open-iscsi
      - nfs-common
    state: present
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  tags: [common, packages]

- name: Install prerequisite packages (RedHat)
  yum:
    name:
      - curl
      - wget
      - ca-certificates
      - socat
      - conntrack-tools        # package name differs from Debian's 'conntrack'
      - ipset
      - ipvsadm
      - chrony
      - iscsi-initiator-utils
      - nfs-utils
    state: present
  when: ansible_os_family == "RedHat"
  tags: [common, packages]

# ── NTP ───────────────────────────────────────────────────────────────────
- name: Configure chrony
  template:
    src: chrony.conf.j2
    dest: /etc/chrony.conf
    mode: "0644"
  notify: restart chrony
  when: configure_ntp
  tags: [common, ntp]

- name: Enable chrony (service name is OS-specific)
  service:
    name: "{{ chrony_svc }}"
    state: started
    enabled: true
  when: configure_ntp
  tags: [common, ntp]

# ── iSCSI daemon ──────────────────────────────────────────────────────────
- name: Enable and start iscsid
  service:
    name: iscsid
    state: started
    enabled: true
  tags: [common, storage]

# ── Swap ──────────────────────────────────────────────────────────────────
- name: Disable swap (runtime)
  command: swapoff -a
  changed_when: false
  tags: [common, swap]

- name: Disable swap (persistent)
  replace:
    path: /etc/fstab
    regexp: '^ *([^#].* swap .*)$'
    replace: '# \1'
  tags: [common, swap]

# ── Kernel modules ────────────────────────────────────────────────────────
- name: Write kernel modules config (persistent)
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
      iscsi_tcp
      dm_crypt
    mode: "0644"
  tags: [common, kernel]

- name: Load kernel modules (runtime)
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
    - iscsi_tcp
    - dm_crypt
  tags: [common, kernel]

# ── Sysctl ────────────────────────────────────────────────────────────────
- name: Set required sysctl parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop:
    - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
    - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { key: net.ipv4.ip_forward,                 value: "1" }
    - { key: net.ipv6.conf.all.forwarding,        value: "1" }
    - { key: kernel.unprivileged_bpf_disabled,    value: "0" }
    - { key: net.core.bpf_jit_enable,             value: "1" }
  tags: [common, sysctl]

# ── System limits ─────────────────────────────────────────────────────────
- name: Write system limits for Kubernetes
  copy:
    dest: /etc/security/limits.d/99-kubernetes.conf
    mode: "0644"
    content: |
      *               soft    nofile          1048576
      *               hard    nofile          1048576
      root            soft    nofile          1048576
      root            hard    nofile          1048576
      *               soft    nproc           1048576
      *               hard    nproc           1048576
      root            soft    nproc           1048576
      root            hard    nproc           1048576
  tags: [common, limits]

# ── multipathd (must be masked before open-iscsi starts) ─────────────────
- name: Mask multipathd to prevent iSCSI interference
  systemd:
    name: "{{ item }}"
    masked: true
  loop:
    - multipathd.service
    - multipathd.socket
  failed_when: false
  tags: [common, storage]

- name: Stop multipathd if running
  systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - multipathd.service
    - multipathd.socket
  failed_when: false
  tags: [common, storage]

# ── kubelet extra args ─────────────────────────────────────────────────────
# AWS: resolved after IMDSv2 metadata tasks below
# On-prem / non-AWS: written here using node_ip (overridable per-host)
- name: Write kubelet extra args (on-prem / non-AWS)
  copy:
    dest: "{{ kubelet_env_file }}"
    mode: "0644"
    content: "KUBELET_EXTRA_ARGS=--node-ip={{ node_ip }}\n"
  when: cloud_provider != "aws"
  tags: [common]

# ── AWS IMDSv2 — kubelet provider-id ─────────────────────────────────────
- name: Fetch IMDSv2 token
  uri:
    url: http://169.254.169.254/latest/api/token
    method: PUT
    headers:
      X-aws-ec2-metadata-token-ttl-seconds: "21600"
    return_content: true
    timeout: 5
  register: imds_token
  when: cloud_provider == "aws"
  failed_when: false
  tags: [common, aws]

- name: Fetch AWS instance-id
  uri:
    url: http://169.254.169.254/latest/meta-data/instance-id
    headers:
      X-aws-ec2-metadata-token: "{{ imds_token.content }}"
    return_content: true
    timeout: 5
  register: aws_instance_id_raw
  when: cloud_provider == "aws" and imds_token is not failed
  failed_when: false
  tags: [common, aws]

- name: Fetch AWS private IP
  uri:
    url: http://169.254.169.254/latest/meta-data/local-ipv4
    headers:
      X-aws-ec2-metadata-token: "{{ imds_token.content }}"
    return_content: true
    timeout: 5
  register: aws_private_ip_raw
  when: cloud_provider == "aws" and imds_token is not failed
  failed_when: false
  tags: [common, aws]

- name: Fetch AWS availability zone
  uri:
    url: http://169.254.169.254/latest/meta-data/placement/availability-zone
    headers:
      X-aws-ec2-metadata-token: "{{ imds_token.content }}"
    return_content: true
    timeout: 5
  register: aws_az_raw
  when: cloud_provider == "aws" and imds_token is not failed
  failed_when: false
  tags: [common, aws]

- name: Write kubelet extra args (AWS)
  copy:
    dest: "{{ kubelet_env_file }}"
    mode: "0644"
    content: "KUBELET_EXTRA_ARGS=--cloud-provider=external --provider-id=aws:///{{ aws_az_raw.content }}/{{ aws_instance_id_raw.content }} --node-ip={{ aws_private_ip_raw.content }}\n"
  when:
    - cloud_provider == "aws"
    - aws_instance_id_raw is not failed
    - aws_instance_id_raw.content is defined
  tags: [common, aws]

- name: Reload systemd daemon
  systemd:
    daemon_reload: true
  tags: [common]

# ── Firewall ──────────────────────────────────────────────────────────────
- name: Disable firewalld (cloud — SG handles rules)
  service:
    name: firewalld
    state: stopped
    enabled: false
  when:
    - disable_host_firewall
    - ansible_os_family == "RedHat"
  failed_when: false
  tags: [common, firewall]

- name: Disable ufw (cloud — SG handles rules)
  service:
    name: ufw
    state: stopped
    enabled: false
  when:
    - disable_host_firewall
    - ansible_os_family == "Debian"
  failed_when: false
  tags: [common, firewall]

# ── On-prem firewall: firewalld (RHEL) ────────────────────────────────────
- name: Open required ports via firewalld (on-prem masters)
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "6443/tcp"
    - "2379-2380/tcp"
    - "10250/tcp"
    - "10259/tcp"
    - "10257/tcp"
    - "4240/tcp"
    - "8472/udp"
    - "51871/udp"
  when:
    - not disable_host_firewall
    - ansible_os_family == "RedHat"
    - inventory_hostname in groups['masters']
  tags: [common, firewall]

- name: Open required ports via firewalld (on-prem workers)
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "10250/tcp"
    - "30000-32767/tcp"
    - "4240/tcp"
    - "8472/udp"
    - "51871/udp"
  when:
    - not disable_host_firewall
    - ansible_os_family == "RedHat"
    - inventory_hostname in groups['workers']
  tags: [common, firewall]

# ── On-prem firewall: ufw (Ubuntu/Debian) ─────────────────────────────────
# SSH must be allowed BEFORE ufw is enabled to prevent control-machine lockout.
- name: Allow SSH via ufw (prevent lockout)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  when:
    - not disable_host_firewall
    - ansible_os_family == "Debian"
  tags: [common, firewall]

- name: Open required ports via ufw (on-prem masters)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "6443",       proto: tcp }
    - { port: "2379:2380",  proto: tcp }
    - { port: "10250",      proto: tcp }
    - { port: "10259",      proto: tcp }
    - { port: "10257",      proto: tcp }
    - { port: "4240",       proto: tcp }
    - { port: "8472",       proto: udp }
    - { port: "51871",      proto: udp }
  when:
    - not disable_host_firewall
    - ansible_os_family == "Debian"
    - inventory_hostname in groups['masters']
  tags: [common, firewall]

- name: Open required ports via ufw (on-prem workers)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "10250",      proto: tcp }
    - { port: "30000:32767", proto: tcp }
    - { port: "4240",       proto: tcp }
    - { port: "8472",       proto: udp }
    - { port: "51871",      proto: udp }
  when:
    - not disable_host_firewall
    - ansible_os_family == "Debian"
    - inventory_hostname in groups['workers']
  tags: [common, firewall]

- name: Set ufw default incoming policy to deny
  community.general.ufw:
    default: deny
    direction: incoming
  when:
    - not disable_host_firewall
    - ansible_os_family == "Debian"
  tags: [common, firewall]

- name: Enable ufw
  community.general.ufw:
    state: enabled
  when:
    - not disable_host_firewall
    - ansible_os_family == "Debian"
  tags: [common, firewall]
