---
- name: Check if cluster is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init_done
  tags: [master]

- name: Detect primary IP if apiserver_advertise_address not set
  set_fact:
    _apiserver_ip: "{{ apiserver_advertise_address if apiserver_advertise_address else ansible_facts['default_ipv4']['address'] }}"
  tags: [master, always]

- name: Fetch public IP via IMDSv2 token (AWS)
  uri:
    url: http://169.254.169.254/latest/api/token
    method: PUT
    headers:
      X-aws-ec2-metadata-token-ttl-seconds: "21600"
    timeout: 5
  register: _imds_token
  when: cloud_provider == "aws"
  failed_when: false
  tags: [master]

- name: Fetch public IP from IMDSv2 (AWS)
  uri:
    url: http://169.254.169.254/latest/meta-data/public-ipv4
    headers:
      X-aws-ec2-metadata-token: "{{ _imds_token.content }}"
    timeout: 5
  register: _master_public_ip
  when: cloud_provider == "aws" and _imds_token is not failed
  failed_when: false
  tags: [master]

- name: Build certSANs list
  set_fact:
    _cert_sans: >-
      {{
        ([_apiserver_ip, '127.0.0.1', 'localhost'] + apiserver_extra_sans)
        + ([_master_public_ip.content] if (cloud_provider == 'aws' and _master_public_ip is not failed and _master_public_ip.content is defined) else [])
      }}
  tags: [master, always]

# ── kubeadm init via config file (reproducible, diffable) ─────────────────
- name: Write kubeadm init config
  template:
    src: kubeadm-init.yaml.j2
    dest: /etc/kubernetes/kubeadm-init.yaml
    mode: "0600"
  tags: [master]

- name: Run kubeadm init
  command: kubeadm init --config /etc/kubernetes/kubeadm-init.yaml
  when: not kubeadm_init_done.stat.exists
  register: kubeadm_init_output
  changed_when: kubeadm_init_output.rc == 0
  tags: [master]

# ── kubeconfig ────────────────────────────────────────────────────────────
- name: Create .kube directory for root
  file:
    path: /root/.kube
    state: directory
    mode: "0700"
  tags: [master]

- name: Copy admin.conf to root kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: "0600"
  tags: [master]

- name: Create .kube directory for ansible user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  when: ansible_user != "root"
  tags: [master]

- name: Copy admin.conf to ansible user kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  when: ansible_user != "root"
  tags: [master]

# ── Helm (pinned version, checksum verified) ──────────────────────────────
- name: Check if Helm is already installed
  command: helm version --short
  register: helm_installed
  changed_when: false
  failed_when: false
  tags: [master, helm]

- name: Download Helm tarball (with SHA256 checksum verification)
  get_url:
    url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-{{ deb_arch }}.tar.gz"
    dest: "/tmp/helm-v{{ helm_version }}.tar.gz"
    checksum: "sha256:https://get.helm.sh/helm-v{{ helm_version }}-linux-{{ deb_arch }}.tar.gz.sha256sum"
    mode: "0644"
  when: helm_installed.rc != 0
  tags: [master, helm]

- name: Extract Helm binary
  unarchive:
    src: "/tmp/helm-v{{ helm_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
  when: helm_installed.rc != 0
  tags: [master, helm]

- name: Install Helm binary
  copy:
    src: "/tmp/linux-{{ deb_arch }}/helm"
    dest: /usr/local/bin/helm
    remote_src: true
    mode: "0755"
    owner: root
    group: root
  when: helm_installed.rc != 0
  tags: [master, helm]

# ── Cilium CNI (OCI Helm, kube-proxy replacement) ────────────────────────
- name: Check if Cilium is already installed
  command: helm status cilium -n kube-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cilium_status
  changed_when: false
  failed_when: false
  tags: [master, cilium]

- name: Install Cilium
  command: >
    helm install {{ cilium_helm_release }}
    oci://quay.io/cilium/charts/cilium
    --version {{ cilium_version }}
    --namespace {{ cilium_helm_namespace }}
    --set kubeProxyReplacement=true
    --set k8sServiceHost={{ _apiserver_ip }}
    --set k8sServicePort=6443
    --set ipam.mode=cluster-pool
    --set ipam.operator.clusterPoolIPv4PodCIDRList={{ pod_network_cidr }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: cilium_status.rc != 0
  changed_when: true
  tags: [master, cilium]

# ── Wait for control plane ────────────────────────────────────────────────
- name: Wait for all control-plane pods to be Running
  command: >
    kubectl get pods -n kube-system
    --field-selector=status.phase=Running
    --no-headers
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cp_pods
  until: cp_pods.stdout_lines | length >= 4
  retries: 24
  delay: 15
  changed_when: false
  tags: [master]

# ── Generate join command for workers ─────────────────────────────────────
# Always generate a fresh token so workers can join even on re-runs.
# Tokens are short-lived (kubeadm_token_ttl) and safe to recreate.
- name: Generate kubeadm join command
  command: kubeadm token create --print-join-command --ttl {{ kubeadm_token_ttl }}
  register: join_command_raw
  changed_when: false
  tags: [master]

- name: Store join command as host fact
  set_fact:
    kubeadm_join_command: "{{ join_command_raw.stdout }}"
  tags: [master, always]

# ── Fetch kubeconfig to control machine ──────────────────────────────────
- name: Fetch kubeconfig to control machine
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/kubeconfig-internal"
    flat: true
    mode: "0600"
  tags: [master, kubeconfig]

- name: Create external kubeconfig (public IP) for kubectl outside the cluster
  delegate_to: localhost
  become: false
  copy:
    src: "{{ playbook_dir }}/kubeconfig-internal"
    dest: "{{ playbook_dir }}/kubeconfig"
    mode: "0600"
  tags: [master, kubeconfig]

- name: Patch external kubeconfig to use public IP (AWS)
  delegate_to: localhost
  become: false
  replace:
    path: "{{ playbook_dir }}/kubeconfig"
    regexp: "https://{{ _apiserver_ip }}:6443"
    replace: "https://{{ _master_public_ip.content }}:6443"
  when:
    - cloud_provider == "aws"
    - _master_public_ip is not failed
    - _master_public_ip.content is defined
  tags: [master, kubeconfig]
