---
# ── Debian / Ubuntu ────────────────────────────────────────────────────────
- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_os_family == "Debian"
  tags: [kubernetes, packages]

- name: Download Kubernetes apt GPG key
  shell: |
    set -o pipefail
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_repo_version }}/deb/Release.key \
      | gpg --dearmor -o {{ kubernetes_apt_keyring_path }}
  args:
    executable: /bin/bash
    creates: "{{ kubernetes_apt_keyring_path }}"
  when: ansible_os_family == "Debian"
  tags: [kubernetes, packages]

- name: Add Kubernetes apt repository
  apt_repository:
    repo: "deb [signed-by={{ kubernetes_apt_keyring_path }}] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_repo_version }}/deb/ /"
    state: present
    filename: kubernetes
  when: ansible_os_family == "Debian"
  tags: [kubernetes, packages]

- name: Install kubeadm, kubelet, kubectl (Debian)
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  tags: [kubernetes, packages]

- name: Hold kubeadm, kubelet, kubectl at current version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  when: ansible_os_family == "Debian"
  tags: [kubernetes, packages]

# ── RedHat / CentOS / Fedora ────────────────────────────────────────────────
- name: Add Kubernetes yum repository
  yum_repository:
    name: kubernetes
    description: "Kubernetes v{{ kubernetes_version }}"
    baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_repo_version }}/rpm/"
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_repo_version }}/rpm/repodata/repomd.xml.key"
    enabled: true
    exclude: "kubelet kubeadm kubectl cri-tools kubernetes-cni"
  when: ansible_os_family == "RedHat"
  tags: [kubernetes, packages]

- name: Install kubeadm, kubelet, kubectl (RedHat)
  yum:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    disable_excludes: kubernetes
  when: ansible_os_family == "RedHat"
  tags: [kubernetes, packages]

- name: Install dnf versionlock plugin (RedHat)
  yum:
    name: python3-dnf-plugin-versionlock
    state: present
  when: ansible_os_family == "RedHat"
  tags: [kubernetes, packages]

- name: Lock kubelet, kubeadm, kubectl versions (RedHat)
  command: dnf versionlock add kubelet kubeadm kubectl
  when: ansible_os_family == "RedHat"
  register: versionlock_result
  changed_when: "'Added' in versionlock_result.stdout"
  failed_when: versionlock_result.rc != 0 and 'already locked' not in versionlock_result.stdout
  tags: [kubernetes, packages]

# ── Common ──────────────────────────────────────────────────────────────────
- name: Enable and start kubelet
  service:
    name: kubelet
    state: started
    enabled: true
  tags: [kubernetes]
