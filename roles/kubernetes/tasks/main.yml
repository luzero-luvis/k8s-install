---
# ── Debian / Ubuntu ────────────────────────────────────────────────────────
- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_os_family == "Debian"

- name: Download Kubernetes apt GPG key
  shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key \
      | gpg --dearmor -o {{ kubernetes_apt_keyring_path }}
  args:
    creates: "{{ kubernetes_apt_keyring_path }}"
  when: ansible_os_family == "Debian"

- name: Add Kubernetes apt repository
  apt_repository:
    repo: "deb [signed-by={{ kubernetes_apt_keyring_path }}] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
    state: present
    filename: kubernetes
  when: ansible_os_family == "Debian"

- name: Install kubeadm, kubelet, kubectl (Debian)
  apt:
    name:
      - "kubelet"
      - "kubeadm"
      - "kubectl"
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Hold kubeadm, kubelet, kubectl at current version (Debian)
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  when: ansible_os_family == "Debian"

# ── RedHat / CentOS / Fedora ────────────────────────────────────────────────
- name: Add Kubernetes yum repository
  yum_repository:
    name: kubernetes
    description: "Kubernetes v{{ kubernetes_version }}"
    baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/"
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/repodata/repomd.xml.key"
    enabled: true
    exclude: "kubelet kubeadm kubectl cri-tools kubernetes-cni"
  when: ansible_os_family == "RedHat"

- name: Install kubeadm, kubelet, kubectl (RedHat)
  yum:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    disable_excludes: kubernetes
  when: ansible_os_family == "RedHat"

# ── Common ──────────────────────────────────────────────────────────────────
- name: Enable and start kubelet
  service:
    name: kubelet
    state: started
    enabled: true
