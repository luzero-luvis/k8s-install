---
# ─────────────────────────────────────────────────────────────────────────────
# FILE: roles/preflight/tasks/main.yml
# PURPOSE: THE CHECKLIST — before installing anything, verify every computer
# meets the minimum requirements for Kubernetes.
# Think of it like a doctor's check-up before surgery. If anything is wrong,
# the whole playbook STOPS and tells you exactly what to fix.
# ─────────────────────────────────────────────────────────────────────────────

# ── OS ────────────────────────────────────────────────────────────────────

# Task: Check the operating system is one we support.
# Why? Kubernetes installation steps are different on Ubuntu vs RHEL vs Debian.
# If someone tries to run this on Fedora or Arch Linux, it will break in confusing ways.
# Better to fail loudly here with a clear message than fail silently later.
- name: Verify supported OS
  fail:                  # "fail" module = immediately stop and print an error message
    msg: >
      # The error message to print. Uses Ansible variables ({{ }}) to fill in real values.
      # ansible_distribution         = the OS name (e.g. "Ubuntu", "Debian", "Rocky")
      # ansible_distribution_version = the full version (e.g. "22.04", "9.3")
      Unsupported OS: {{ ansible_distribution }} {{ ansible_distribution_version }}.
      Supported: Ubuntu 22/24, Debian 12, RHEL/Rocky/AlmaLinux 9.
  when: >
    # "when" = only run this task IF the condition below is TRUE.
    # "not (...)" = fail when NONE of the supported OS conditions match.
    # We use "or" to list all supported combinations.
    not (
      # Allow Ubuntu version 22 or 24 (LTS versions)
      (ansible_distribution == "Ubuntu" and ansible_distribution_major_version in ["22","24"]) or
      # Allow Debian version 12 (Bookworm)
      (ansible_distribution == "Debian" and ansible_distribution_major_version == "12") or
      # Allow RHEL, Rocky, AlmaLinux version 9 (they all have os_family = "RedHat")
      (ansible_os_family == "RedHat" and ansible_distribution_major_version == "9")
    )
  tags: [preflight]   # Tag = you can run JUST this task with --tags preflight

# ── Kernel ────────────────────────────────────────────────────────────────

# Task: Check the Linux kernel version is new enough.
# Why? Cilium (our networking layer) uses a Linux feature called eBPF.
# eBPF is only available in kernel 5.10 and newer.
# On older kernels, Cilium simply will not work — so check early.
- name: Verify kernel >= 5.10 (required for Cilium eBPF)
  fail:
    msg: >
      # ansible_kernel         = the running kernel version string (e.g. "5.15.0-91-generic")
      # inventory_hostname     = this computer's nickname from inventory (e.g. "worker-1")
      Kernel {{ ansible_kernel }} on {{ inventory_hostname }} is too old.
      Cilium eBPF requires >= 5.10. Run: apt-get install --install-recommends linux-generic-hwe-22.04
  when: ansible_kernel is version('5.10', '<')
  # ansible_kernel is version('5.10', '<') = true if kernel version is LESS THAN 5.10
  # The "version" test does proper version comparison (not string comparison)
  tags: [preflight]

# ── CPU ───────────────────────────────────────────────────────────────────

# Task: Check the computer has at least 2 CPU cores.
# Why? Kubernetes has a hard requirement — it REFUSES to start on a 1-CPU machine.
# The control plane alone uses a full CPU just to exist.
- name: Verify CPU count >= 2
  fail:
    msg: "{{ inventory_hostname }} has {{ ansible_processor_vcpus }} vCPU. Kubernetes requires >= 2."
    # ansible_processor_vcpus = total number of CPU cores/threads Ansible detected
  when: ansible_processor_vcpus < 2   # Fail if fewer than 2 CPUs
  tags: [preflight]

# ── Memory ────────────────────────────────────────────────────────────────

# Task: Check there's enough RAM — different minimums for master vs workers.
# Why? Master needs more RAM because it runs etcd (the database), the API server,
# scheduler, and controller manager — all at the same time.
# Workers just need enough to run the pods you assign to them.
- name: Verify memory — master >= 2 GB, worker >= 1.5 GB
  fail:
    msg: >
      # ansible_memtotal_mb = total RAM in megabytes that Ansible detected
      # groups['masters'] = the list of all master computer names from inventory
      # if in masters → require 2048MB (2GB), else → require 1536MB (1.5GB)
      {{ inventory_hostname }} has {{ ansible_memtotal_mb }}MB RAM.
      Required: {{ 2048 if inventory_hostname in groups['masters'] else 1536 }}MB.
  when: >
    # Fail if: this is a master AND has less than 2048MB RAM
    (inventory_hostname in groups['masters'] and ansible_memtotal_mb < 2048) or
    # OR: this is a worker AND has less than 1536MB RAM
    (inventory_hostname in groups['workers']  and ansible_memtotal_mb < 1536)
  tags: [preflight]

# ── Disk ──────────────────────────────────────────────────────────────────

# Task: Check there's at least 20GB of free disk space on the root partition.
# Why? Kubernetes pulls container images (which can be gigabytes each),
# stores logs, and writes etcd data. Running out of disk = cluster crash.
- name: Verify disk space on / >= 20 GB
  fail:
    msg: >
      # item.size_available = free bytes on this mount point
      # / 1073741824 = divide by bytes-per-GB to convert to GB
      # | round(1) = round to 1 decimal place (e.g. 18.3GB)
      {{ inventory_hostname }} has {{ (item.size_available / 1073741824) | round(1) }}GB
      free on /. Need >= 20GB.
  when: item.mount == '/' and item.size_available < 21474836480
  # item.mount == '/' = we only care about the root partition (not /boot, /tmp, etc.)
  # 21474836480 = 20 × 1024^3 = exactly 20GB in bytes
  loop: "{{ ansible_mounts }}"
  # ansible_mounts = a list of all mounted partitions (gathered by Ansible automatically)
  # loop = run this task once for EACH partition, checking the one that is "/"
  tags: [preflight]

# ── Internet connectivity ──────────────────────────────────────────────────

# Tasks below: Verify the computer can reach the package download servers.
# Why? If the computer can't reach the internet (firewall, proxy, DNS issue),
# the installation will fail with confusing errors deep into the process.
# Better to check connectivity now and show a clear "can't reach X" error.

- name: Verify connectivity to pkgs.k8s.io
  uri:                                        # "uri" module = make an HTTP request (like opening a URL in a browser)
    url: https://pkgs.k8s.io                  # The Kubernetes official package repository
    timeout: 10                               # Give up if no response within 10 seconds
    status_code: [200, 301, 302]              # Any of these HTTP status codes = success
                                              # 200 = OK, 301/302 = redirect (still reachable)
  tags: [preflight]

- name: Verify connectivity to download.docker.com
  uri:
    url: https://download.docker.com          # Docker's package server (we get containerd from here)
    timeout: 10
    status_code: [200, 301, 302]
  tags: [preflight]

- name: Verify connectivity to quay.io (Cilium images)
  uri:
    url: https://quay.io                      # Red Hat's container image registry (Cilium images live here)
    timeout: 10
    status_code: [200, 301, 302]
  tags: [preflight]

- name: Verify connectivity to get.helm.sh
  uri:
    url: https://get.helm.sh                  # Helm's download server
    timeout: 10
    status_code: [200, 301, 302, 404]
    # 404 is also OK here — the CDN root returns 404 but file downloads still work fine.
    # Example: get.helm.sh returns 404 but get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz returns 200.
  tags: [preflight]

# ── Unique hostnames ──────────────────────────────────────────────────────

# Task: Make sure no two computers have the same hostname.
# Why? Kubernetes uses hostnames as unique identifiers for nodes.
# If two computers have the same hostname, Kubernetes gets confused
# and thinks they're the same machine — causing very strange bugs.

- name: Collect hostnames across cluster
  set_fact:   # set_fact = create a variable and save it for use in later tasks
    # all_hostnames = a list of every computer's inventory_hostname
    # groups['k8s_cluster'] = list of all computer nicknames
    # map('extract', hostvars, 'inventory_hostname') = for each computer, get its hostname
    # list = convert the result to a plain Python list
    all_hostnames: "{{ groups['k8s_cluster'] | map('extract', hostvars, 'inventory_hostname') | list }}"
  tags: [preflight]

- name: Verify all node hostnames are unique
  fail:
    msg: "Duplicate hostnames detected in inventory: {{ all_hostnames }}"
  when: all_hostnames | length != all_hostnames | unique | length
  # all_hostnames | length        = total number of hostnames
  # all_hostnames | unique | length = number of UNIQUE hostnames
  # If they're different → there are duplicates → fail
  tags: [preflight]

# ── Unique IPs ────────────────────────────────────────────────────────────

# Task: Make sure no two computers have the same IP address.
# Why? Same reason as hostnames — duplicate IPs cause network chaos.
# Also catches typos in the inventory file (copy-pasting the same IP twice).

- name: Collect node IPs across cluster
  set_fact:
    # Same pattern as hostnames above, but extract 'ansible_host' (the IP address)
    all_ips: "{{ groups['k8s_cluster'] | map('extract', hostvars, 'ansible_host') | list }}"
  tags: [preflight]

- name: Verify all node IPs are unique
  fail:
    msg: "Duplicate ansible_host IPs detected: {{ all_ips }}"
  when: all_ips | length != all_ips | unique | length   # Same logic — if count ≠ unique count → duplicates
  run_once: true   # Only run this check ONCE (not once per computer) since it looks at the whole cluster
  tags: [preflight]

# ── Summary ───────────────────────────────────────────────────────────────

# Task: Print a nice summary of each computer's specs to the terminal.
# Why? So you can quickly see what hardware you're working with before installation starts.
# Makes debugging easy — you can see at a glance if something looks wrong.
- name: Print pre-flight summary
  debug:
    msg:
      # Each line is one piece of info about the current computer (inventory_hostname)
      - "Host   : {{ inventory_hostname }}"                   # Computer nickname from inventory
      - "OS     : {{ ansible_distribution }} {{ ansible_distribution_version }}"  # e.g. "Ubuntu 22.04"
      - "Kernel : {{ ansible_kernel }}"                       # e.g. "5.15.0-91-generic"
      - "CPU    : {{ ansible_processor_vcpus }} vCPU"         # Number of CPU cores
      - "Memory : {{ ansible_memtotal_mb }} MB"               # Total RAM in megabytes
      # For disk: filter mounts to find "/", get first match, get size_available, format as human-readable
      - "Disk / : {{ (ansible_mounts | selectattr('mount', 'equalto', '/') | list | first).size_available | filesizeformat }} free"
  tags: [preflight]
